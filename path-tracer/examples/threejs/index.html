<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Three.js + WebGL Path Tracer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font: 14px monospace;
        }
    </style>
</head>

<body>
    <div id="info">SPP: <span id="spp">0</span></div>
    <canvas id="canvas"></canvas>

    <!-- Three.js from CDN (only needed for scene definition, not rendering) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>

</html>
