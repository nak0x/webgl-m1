<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  rgba(255,255,255,0.08);
      --accent:  #4a80f5;
      --text:    #e6edf3;
      --muted:   rgba(230,237,243,0.45);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Scanlines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.05) 3px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ════════════════════════════════
       LAYOUT
    ════════════════════════════════ */
    .app {
      display: grid;
      grid-template-rows: 64px 1fr 72px;
      height: 100%;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(22,27,34,0.9);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }

    .status__dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3fb950;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main ── */
    main {
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      user-select: none;
    }

    .card:hover {
      border-color: rgba(74,128,245,0.5);
      background: rgba(74,128,245,0.07);
      transform: translateY(-2px);
    }

    .card:active {
      transform: translateY(0) scale(0.98);
    }

    .card--active {
      border-color: var(--accent) !important;
      background: rgba(74,128,245,0.12) !important;
    }

    .card__icon {
      font-size: 22px;
      margin-bottom: 10px;
      display: block;
    }

    .card__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card__desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Detail panel (apparaît au clic) ── */
    .detail {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.35s ease;
    }

    .detail.open {
      max-height: 160px;
      opacity: 1;
    }

    .detail__title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .detail__text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Progress bars ── */
    .skills {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skill {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .skill__header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }

    .skill__bar {
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .skill__fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      width: 0;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-top: 1px solid var(--border);
      background: rgba(22,27,34,0.9);
    }

    .footer__label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .footer__btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(74,128,245,0.12);
      border: 1px solid rgba(74,128,245,0.3);
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .footer__btn:hover {
      background: rgba(74,128,245,0.22);
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <span class="logo">POC · Interactive Screen</span>
    <div class="status">
      <span class="status__dot"></span>
      Online
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Section : Menu -->
    <div>
      <p class="section-title">Navigation</p>
      <div class="grid">
        <div class="card" data-id="projects">
          <span class="card__icon">📁</span>
          <p class="card__title">Projects</p>
          <p class="card__desc">Voir tous les projets en cours</p>
        </div>
        <div class="card" data-id="skills">
          <span class="card__icon">⚡</span>
          <p class="card__title">Skills</p>
          <p class="card__desc">Stack technique et compétences</p>
        </div>
        <div class="card" data-id="about">
          <span class="card__icon">👤</span>
          <p class="card__title">About</p>
          <p class="card__desc">Qui suis-je et mon parcours</p>
        </div>
        <div class="card" data-id="contact">
          <span class="card__icon">✉️</span>
          <p class="card__title">Contact</p>
          <p class="card__desc">Me contacter directement</p>
        </div>
      </div>
    </div>

    <!-- Section : Detail panel -->
    <div class="detail" id="detail">
      <p class="detail__title" id="detail-title">—</p>
      <p class="detail__text" id="detail-text">—</p>
    </div>

    <!-- Section : Skills -->
    <div>
      <p class="section-title">Stack</p>
      <div class="skills" id="skills-container">
        <div class="skill">
          <div class="skill__header"><span>Three.js / WebGL</span><span>90%</span></div>
          <div class="skill__bar"><div class="skill__fill" data-width="90"></div></div>
        </div>
        <div class="skill">
          <div class="skill__header"><span>Vue / Nuxt</span><span>85%</span></div>
          <div class="skill__bar"><div class="skill__fill" data-width="85"></div></div>
        </div>
        <div class="skill">
          <div class="skill__header"><span>GLSL / Shaders</span><span>70%</span></div>
          <div class="skill__bar"><div class="skill__fill" data-width="70"></div></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <span class="footer__label" id="footer-msg">Sélectionne un item</span>
    <button class="footer__btn" id="close-btn">✕ Fermer</button>
  </footer>

</div>

<script>
  // ── Données des cards ──────────────────────────────────
  const DETAILS = {
    projects: {
      title: '📁 Projects',
      text:  '3 projets actifs : WebGL POC, Portfolio 3D, Shader Lab. Tous sur GitHub.'
    },
    skills: {
      title: '⚡ Skills',
      text:  'Three.js, GLSL, Vue 3, Nuxt, GSAP. Focus sur le rendu temps réel et les interactions.'
    },
    about: {
      title: '👤 About',
      text:  'Développeur créatif spécialisé WebGL. Passionné par les expériences 3D interactives.'
    },
    contact: {
      title: '✉️ Contact',
      text:  'Disponible pour des missions freelance. contact@example.com'
    }
  }

  // ── Cards click ───────────────────────────────────────
  let activeCard = null

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id
      const data = DETAILS[id]

      // Toggle active card
      if (activeCard === card) {
        card.classList.remove('card--active')
        closeDetail()
        activeCard = null
        setFooter('Sélectionne un item')
        // Notifie Three.js
        window.parent?.postMessage({ type: 'cardClose' }, '*')
        return
      }

      document.querySelectorAll('.card').forEach(c => c.classList.remove('card--active'))
      card.classList.add('card--active')
      activeCard = card

      openDetail(data.title, data.text)
      setFooter(`${data.title} sélectionné`)

      // Notifie Three.js
      window.parent?.postMessage({ type: 'itemClick', label: id }, '*')
    })
  })

  // ── Detail panel ──────────────────────────────────────
  function openDetail(title, text) {
    const el    = document.getElementById('detail')
    const tEl   = document.getElementById('detail-title')
    const txtEl = document.getElementById('detail-text')
    tEl.textContent   = title
    txtEl.textContent = text
    el.classList.add('open')
  }

  function closeDetail() {
    document.getElementById('detail').classList.remove('open')
  }

  // ── Footer ────────────────────────────────────────────
  function setFooter(msg) {
    document.getElementById('footer-msg').textContent = msg
  }

  // ── Bouton Fermer → notifie le parent Three.js ────────
  document.getElementById('close-btn').addEventListener('click', () => {
    window.parent?.postMessage({ type: 'close' }, '*')
  })

  // ── Animate skill bars on load ────────────────────────
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.querySelectorAll('.skill__fill').forEach(fill => {
        fill.style.width = fill.dataset.width + '%'
      })
    }, 200)
  })
</script>

</body>
</html>
