<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solarpunk Moss — Cell Shaded Environment</title>
  <meta name="description" content="White solarpunk cell-shaded environment with realistic procedural moss accents">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a1a; font-family: 'Inter', sans-serif; }
    canvas { display: block; }
    #controls-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.5px;
      pointer-events: none;
      transition: opacity 3s ease;
    }
    #controls-hint.fade { opacity: 0; }
  </style>
</head>
<body>
  <div id="controls-hint">Drag to orbit · Shift+Drag to pan · Scroll to zoom</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
